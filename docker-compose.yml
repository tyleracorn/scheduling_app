services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cabin
      POSTGRES_PASSWORD: cabin
      POSTGRES_DB: cabin_scheduling
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabin -d cabin_scheduling"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cabin:cabin@db:5432/cabin_scheduling
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
